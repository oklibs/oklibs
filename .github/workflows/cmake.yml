name: CMake Integration

on:
  pull_request:
  push:
    branches: [main, dev]
    paths-ignore: [.gitignore, LICENSE, README.md]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}, ${{ matrix.mode }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read # Only needed for private repos.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, mode: Release }

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Dependencies
        run: /home/linuxbrew/.linuxbrew/bin/brew install fmt

      - name: Configure
        run: | # zizmor: ignore[template-injection] Matrix is static.
          cmake -B build -S . -DCMAKE_BUILD_TYPE=${{ matrix.mode }} -Dfmt_DIR=/home/linuxbrew/.linuxbrew/lib/cmake/fmt

      - name: Build
        run: | # zizmor: ignore[template-injection] Matrix is static.
          cmake --build build --config ${{ matrix.mode }}
